<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kzoro Karaoke | Hát Cực Chất</title>
    <link rel="icon" href="./avt.jpg" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #09090b; --panel-bg: rgba(24, 24, 27, 0.75);
            --primary: #f59e0b; /* Màu chủ đạo Cam Karaoke */
            --primary-glow: rgba(245, 158, 11, 0.5);
            --secondary: #ef4444; --text-main: #f8fafc;
            --text-muted: #94a3b8; --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }

        body {
            background-color: var(--bg-dark); color: var(--text-main);
            width: 100vw; height: 100vh; /* Đảm bảo full màn hình */
            display: flex; flex-direction: column; overflow: hidden;
            background-image: radial-gradient(circle at 10% 20%, rgba(245, 158, 11, 0.15), transparent 30%),
                              radial-gradient(circle at 90% 80%, rgba(239, 68, 68, 0.15), transparent 30%);
        }

        /* --- LAYOUT CHÍNH --- */
        .app-container { display: flex; flex: 1; overflow: hidden; padding: 15px; gap: 15px; width: 100%; }

        /* --- SIDEBAR --- */
        .sidebar {
            width: 290px; background: var(--panel-bg); border: 1px solid var(--glass-border);
            border-radius: 20px; padding: 25px 20px; display: flex; flex-direction: column;
            backdrop-filter: blur(25px); z-index: 10;
        }
        .logo { font-size: 1.6rem; font-weight: 800; display: flex; align-items: center; gap: 12px; margin-bottom: 30px; background: linear-gradient(135deg, var(--primary), var(--secondary)); -webkit-background-clip: text; color: transparent; }
        
        .nav-menu { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
        .nav-item {
            display: flex; align-items: center; gap: 15px; padding: 12px 18px; border-radius: 12px;
            color: var(--text-muted); text-decoration: none; font-weight: 500; cursor: pointer; transition: all 0.3s;
        }
        .nav-item:hover { color: var(--text-main); background: rgba(255, 255, 255, 0.05); }
        .nav-item.active { background: linear-gradient(135deg, rgba(245, 158, 11, 0.2), rgba(239, 68, 68, 0.2)); color: var(--text-main); border: 1px solid var(--glass-border); box-shadow: 0 4px 15px var(--primary-glow); }

        .divider { height: 1px; background: var(--glass-border); margin: 15px 0; }
        .btn-ghost { background: transparent; border: 1px dashed var(--text-muted); color: var(--text-muted); padding: 10px; border-radius: 12px; width: 100%; cursor: pointer; transition: 0.2s; font-weight: 500; display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 12px; text-decoration: none;}
        .btn-ghost:hover { border-color: var(--text-main); color: var(--text-main); }

        /* --- MAIN CONTENT --- */
        .main-content {
            flex: 1; background: var(--panel-bg); border: 1px solid var(--glass-border);
            border-radius: 20px; backdrop-filter: blur(25px); 
            display: flex; flex-direction: column; overflow: hidden; position: relative;
        }

        .header { padding: 25px 35px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--glass-border); }
        .page-title { font-size: 1.8rem; font-weight: 700; display: flex; align-items: center; gap: 10px; color: var(--primary);}
        
        .search-box { position: relative; flex: 1; max-width: 500px; display: flex; gap: 10px;}
        .search-box i { position: absolute; left: 20px; top: 50%; transform: translateY(-50%); color: var(--text-muted); }
        .search-box input {
            flex: 1; padding: 15px 20px 15px 50px; border-radius: 30px; border: 1px solid var(--glass-border);
            background: rgba(0,0,0,0.4); color: white; font-size: 1rem; outline: none; transition: 0.3s;
        }
        .search-box input:focus { border-color: var(--primary); box-shadow: 0 0 15px var(--primary-glow); background: rgba(0,0,0,0.6);}

        .content-area { flex: 1; overflow-y: auto; padding: 25px 35px; display: flex; flex-direction: column; gap: 20px; }
        
        /* THEATER MODE (KARAOKE PLAYER) CHUẨN 16:9 */
        .theater-wrapper { width: 100%; display: flex; justify-content: center; }
        .theater-box {
            width: 100%; max-width: 950px; aspect-ratio: 16/9; background: #000; border-radius: 16px; 
            border: 1px solid var(--glass-border); box-shadow: 0 15px 40px rgba(0,0,0,0.6);
            display: flex; justify-content: center; align-items: center; overflow: hidden; position: relative;
            flex-shrink: 0;
        }
        .theater-box iframe { width: 100%; height: 100%; border: none; display: none; }
        .theater-placeholder { text-align: center; color: var(--text-muted); }
        .theater-placeholder i { font-size: 4rem; color: var(--glass-border); margin-bottom: 15px; display: block;}

        /* List Nhạc */
        .song-list { display: flex; flex-direction: column; gap: 10px; max-width: 950px; margin: 0 auto; width: 100%;}
        .song-card {
            display: flex; align-items: center; padding: 10px 20px; border-radius: 16px; background: rgba(255,255,255,0.02);
            border: 1px solid transparent; cursor: pointer; transition: 0.3s;
        }
        .song-card:hover { background: rgba(255,255,255,0.06); border-color: var(--primary); transform: translateY(-2px); }
        .song-card.playing { background: linear-gradient(90deg, rgba(245, 158, 11, 0.15), transparent); border-left: 4px solid var(--primary); }
        
        .s-img { width: 80px; height: 50px; border-radius: 8px; object-fit: cover; margin-right: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.5);}
        .s-info { flex: 1; display: flex; flex-direction: column; overflow: hidden; white-space: nowrap; }
        .s-title { font-weight: 600; font-size: 1.1rem; margin-bottom: 5px; text-overflow: ellipsis; overflow: hidden;}
        .s-artist { font-size: 0.85rem; color: var(--text-muted); }
        
        /* Loader */
        .loader { text-align: center; color: var(--primary); font-size: 1.2rem; font-weight: bold; margin-top: 30px; display: none; flex-direction: column; gap: 15px; align-items: center;}
        .loader i { animation: spin 1s linear infinite; font-size: 2.5rem;}
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="app-container">
        <!-- SIDEBAR -->
        <div class="sidebar">
            <div class="logo"><i class="fa-solid fa-microphone-lines"></i> Kzoro Karaoke</div>
            
            <div class="nav-menu">
                <a class="nav-item active" href="karaoke.html">
                    <i class="fa-solid fa-tv"></i> Phòng Hát (YouTube)
                </a>
            </div>

            <div class="divider"></div>

            <div style="font-size: 0.85rem; color: var(--text-muted); line-height: 1.6; text-align: center; margin-bottom: 20px;">
                Chỉ cần gõ tên bài hát, hệ thống sẽ tự động tìm bản <b>Karaoke</b> chuẩn nhất cho bạn!
            </div>
            
            <a href="index.html" class="btn-ghost" style="margin-top: auto; border-color: var(--secondary); color: var(--secondary);">
                <i class="fa-solid fa-headphones"></i> Về App Nghe Nhạc
            </a>
            <a href="tools.html" class="btn-ghost" style="border-color: transparent;">
                <i class="fa-solid fa-arrow-left"></i> Quay lại Menu
            </a>
        </div>

        <!-- MAIN CONTENT -->
        <div class="main-content">
            <div class="header">
                <div class="page-title"><i class="fa-solid fa-fire"></i> Sân Khấu</div>
                
                <div class="search-box">
                    <i class="fa-solid fa-search"></i>
                    <input type="text" id="searchInput" placeholder="Nhập tên bài hát muốn hát..." onkeypress="searchKaraoke(event)">
                </div>
            </div>
            
            <div class="content-area">
                <!-- KHUNG PHÁT VIDEO KARAOKE -->
                <div class="theater-wrapper">
                    <div class="theater-box" id="theaterBox">
                        <div class="theater-placeholder" id="theaterPlaceholder">
                            <i class="fa-solid fa-microphone-stand"></i>
                            <p>Tìm kiếm bài hát để bắt đầu ngay!</p>
                        </div>
                        <!-- Cấu hình chuẩn cho YouTube Iframe -->
                        <iframe id="karaokePlayer" src="" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
                    </div>
                </div>

                <div id="loader" class="loader"><i class="fa-solid fa-circle-notch"></i> <span>Đang tìm nhạc...</span></div>
                
                <!-- DANH SÁCH KẾT QUẢ -->
                <div class="song-list" id="viewList"></div>
            </div>
        </div>
    </div>

    <script>
        const YOUTUBE_API_KEY = "AIzaSyCjp5YPl8C5px85e8lS-dku5x08fKgBpKo"; 
        let searchResults = [];

        async function searchKaraoke(e) {
            if(e.key === 'Enter') {
                const rawQuery = document.getElementById('searchInput').value.trim();
                if(!rawQuery) return;

                // Tự động thêm chữ "karaoke"
                const query = rawQuery.toLowerCase().includes('karaoke') ? rawQuery : rawQuery + ' karaoke';

                const viewList = document.getElementById('viewList');
                const loader = document.getElementById('loader');
                
                viewList.innerHTML = '';
                loader.style.display = 'flex';

                try {
                    // Thêm &videoEmbeddable=true để LỌC BỎ các video bị cấm phát trên web
                    const searchUrl = `https://www.googleapis.com/youtube/v3/search?part=snippet&maxResults=10&videoEmbeddable=true&q=${encodeURIComponent(query)}&type=video&key=${YOUTUBE_API_KEY}`;
                    const res = await fetch(searchUrl);
                    const data = await res.json();
                    
                    loader.style.display = 'none';

                    if(data.items && data.items.length > 0) {
                        searchResults = data.items.map(item => ({
                            id: item.id.videoId,
                            title: decodeEntities(item.snippet.title),
                            artist: item.snippet.channelTitle,
                            cover: `https://img.youtube.com/vi/${item.id.videoId}/maxresdefault.jpg`
                        }));
                        renderList();
                    } else {
                        viewList.innerHTML = '<p style="color:#9ca3af; text-align:center; padding: 20px;">Không tìm thấy bài Karaoke nào cho phép phát.</p>';
                    }
                } catch(err) {
                    loader.style.display = 'none';
                    alert("Lỗi kết nối API YouTube. Có thể API Key đã hết lượt truy cập hôm nay!");
                }
            }
        }

        function decodeEntities(encodedString) {
            var textArea = document.createElement('textarea');
            textArea.innerHTML = encodedString;
            return textArea.value;
        }

        function renderList() {
            const viewList = document.getElementById('viewList');
            viewList.innerHTML = '';
            
            searchResults.forEach((song, idx) => {
                viewList.innerHTML += `
                    <div class="song-card" onclick="playKaraoke('${song.id}', this)">
                        <img src="${song.cover}" class="s-img" onerror="this.src='./avt.jpg'">
                        <div class="s-info">
                            <div class="s-title">${song.title}</div>
                            <div class="s-artist"><i class="fa-brands fa-youtube" style="color: #ef4444;"></i> ${song.artist}</div>
                        </div>
                        <i class="fa-solid fa-play" style="color: var(--primary); font-size: 1.2rem; margin-left: 10px;"></i>
                    </div>
                `;
            });
        }

        async function playKaraoke(videoId, element) {
            document.querySelectorAll('.song-card').forEach(el => el.classList.remove('playing'));
            element.classList.add('playing');

            document.getElementById('theaterPlaceholder').style.display = 'none';
            const playerBox = document.getElementById('theaterBox');
            
            // Hiện hiệu ứng loading
            const oldIframe = document.getElementById('karaokePlayer');
            if(oldIframe) oldIframe.remove();
            const oldVideo = document.getElementById('nativePlayer');
            if(oldVideo) oldVideo.remove();
            
            playerBox.innerHTML += `<div id="vidLoader" style="color:var(--primary); font-size:2rem;"><i class="fa-solid fa-spinner fa-spin"></i></div>`;

            try {
                // Gọi API Piped để trích xuất thẳng file MP4
                const res = await fetch(`https://pipedapi.kavin.rocks/streams/${videoId}`);
                const data = await res.json();
                
                // Lấy luồng video tốt nhất (có cả hình và tiếng)
                const videoStream = data.videoStreams.find(s => s.videoOnly === false) || data.videoStreams[0];
                
                document.getElementById('vidLoader').remove();
                
                // Tạo thẻ video thuần HTML5
                playerBox.innerHTML += `
                    <video id="nativePlayer" controls autoplay style="width: 100%; height: 100%; border-radius: 16px;">
                        <source src="${videoStream.url}" type="${videoStream.mimeType}">
                    </video>
                `;
            } catch(err) {
                // Nếu Piped sập, quay về dùng Iframe của YouTube như cũ
                document.getElementById('vidLoader').remove();
                playerBox.innerHTML += `
                    <iframe id="karaokePlayer" src="https://www.youtube.com/embed/${videoId}?autoplay=1&fs=1&modestbranding=1&rel=0" frameborder="0" allow="autoplay; fullscreen" style="width:100%; height:100%; display:block; border-radius:16px;"></iframe>
                `;
            }
            
            document.querySelector('.content-area').scrollTo({ top: 0, behavior: 'smooth' });
        }
    </script>
</body>
</html>
